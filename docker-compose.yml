services:
  db:
    image: postgres:16
    container_name: stackanomics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stackanomics
    ports:
      # Host port 5433 (not 5432) so it never clashes with a Postgres someone
      # already has running locally. Connect via localhost:5433.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stackanomics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
